<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./assets/all-tailwind-classes-full-min.css">
    <title>formulario</title>

</head>
<body  class="bg-gray-100 flex justify-center items-center h-screen">


      
  <div class="bg-white p-8 rounded-lg shadow-lg w-96">
    <h2 class="text-2xl font-semibold text-center mb-6">sobre a Consulta</h2>
    <form id="formulario" action="#" method="POST">
      
      <div class="mb-4">
        <label for="nome" class="block text-sm font-medium text-gray-700">Nome Completo</label>
        <input type="text" id="nomear" name="nome" class="w-full p-2 border border-gray-300 rounded-md" required>
      </div>
      <div class="mb-4">
        <label for="data-nascimento" class="block text-sm font-medium text-gray-700">Data de Nascimento</label>
        <input type="date" id="data-nascimento" name="data-nascimento" class="w-full p-2 border border-gray-300 rounded-md" required>
      </div>
      <div class="mb-4">
        <label for="email" class="block text-sm font-medium text-gray-700">email</label>
        <input type="email" id="email" name="email" class="w-full p-2 border border-gray-300 rounded-md" required>
          
      </input>
      </div>
      <div class="mb-4">
        <label for="telefone" class="block text-sm font-medium text-gray-700">Telefone</label>
        <input type="tel" id="telefone" name="telefone" class="w-full p-2 border border-gray-300 rounded-md" required>
      </div>
   
      <div class="mb-4">
        <label for="motivo" class="block text-sm font-medium text-gray-700">Motivo da Consulta</label>
        <textarea id="motivo" name="motivo" rows="4" class="w-full p-2 border border-gray-300 rounded-md" required></textarea>
      </div>
      
      <button type="button" onclick="mostrarModal()" class="w-full py-2 px-4 bg-blue-500 text-white rounded-md hover:bg-blue-700">Enviar</button>
    </form>
  </div>
 
  <div id="modal" class="fixed inset-0 bg-gray-500 bg-opacity-50 flex justify-center items-center hidden">
    <div class="bg-white p-6 rounded-lg w-96">
      <h3 class="text-xl font-semibold text-center mb-4">Tem certeza de que deseja enviar?</h3>
      <p id="dados-modal" class="text-sm mb-4"></p>
      <div class="flex justify-between">
        <button onclick="fecharModal()" class="py-2 px-4 bg-gray-500 text-white rounded-md hover:bg-gray-700">Cancelar</button>
        <button onclick="enviarFormulario()" class="py-2 px-4 bg-blue-500 text-white rounded-md hover:bg-blue-700">Confirmar</button>
      </div>
    </div>
  </div>






<script src="./assets/script/formulario.js"></script>





    
</body>
</html>
